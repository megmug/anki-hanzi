<script>
    function playAudio() {
        var audioDiv = document.getElementById('audio');
        var audio = audioDiv.getElementsByTagName("*");
        audio[0].tagName == "AUDIO" ? audio[0].play() : audio[0].click();
    }

    document.getElementById("btnPlayAudio").onclick = function () {
        playAudio();
    };

    var frontBack = "back";
    var switchIdList = ["text-pinyin", "text-zhuyin", "text-meaning", "text-sim", "text-trad"];
    var displayDefaultPrefs = {
        "backtext-pinyin": "true",
        "backtext-zhuyin": "false",
        "backtext-meaning": "true",
        "backtext-sim": "true",
        "backtext-trad": "false"
    };
    var displayDefaultPrefsMarker = "xiehanzi-display-defaults-v2";
    var numberInputList = ["no-of-sentence", "length-of-sentence", "level-of-sentence"];
    var sentenceCheckboxList = ["text-sentence", "text-sentence-random", "text-sentence-colored"];

    function initDisplayDefaultPrefs() {
        if (!(window.Persistence && Persistence.isAvailable())) {
            return;
        }
        if (Persistence.getItem(displayDefaultPrefsMarker) == "true") {
            return;
        }
        for (var perId in displayDefaultPrefs) {
            if (Object.prototype.hasOwnProperty.call(displayDefaultPrefs, perId)) {
                Persistence.setItem(perId, displayDefaultPrefs[perId]);
            }
        }
        Persistence.setItem(displayDefaultPrefsMarker, "true");
    }

    function getDisplayPref(perId) {
        var stored = Persistence.getItem(perId);
        if (stored === undefined || stored === null) {
            stored = Object.prototype.hasOwnProperty.call(displayDefaultPrefs, perId)
                ? displayDefaultPrefs[perId]
                : "true";
            Persistence.setItem(perId, stored);
        }
        return stored;
    }

    function initSwitchPrefs() {
        initDisplayDefaultPrefs();
        // Initialize display switches
        switchIdList.forEach(_id => {
            var perId = frontBack + _id;
            var divId = _id.replace("text-", "char_");
            var elem = document.getElementById(_id);
            var divElem = document.getElementById(divId);
            var stored = getDisplayPref(perId);

            if (stored == "false") {
                elem.checked = false;
                divElem.style.display = "none";
            } else {
                elem.checked = true;
                divElem.style.display = "block";
            }

            applyToggleEffect(_id, elem.checked);
        });

        // Initialize sentence checkboxes
        sentenceCheckboxList.forEach(_id => {
            var elem = document.getElementById(_id);
            if (elem) {
                var saved = Persistence.getItem(frontBack + _id);
                elem.checked = saved !== "false";
                Persistence.setItem(frontBack + _id, elem.checked.toString());
            }
        });

        // Initialize number inputs
        numberInputList.forEach(_id => {
            var elem = document.getElementById(_id);
            if (elem) {
                var saved = Persistence.getItem(frontBack + _id);
                if (saved) elem.value = saved;
                Persistence.setItem(frontBack + _id, elem.value);
            }
        });
    }

    function setPrefs(e) {
        var perId = frontBack + e.id;
        Persistence.setItem(perId, e.type === "checkbox" ? e.checked.toString() : e.value);

        if (e.type === "checkbox") {
            var divId = e.id.replace("text-", "char_");
            var divElem = document.getElementById(divId);
            if (divElem) {
                divElem.style.display = e.checked ? "block" : "none";
                applyToggleEffect(e.id, e.checked);
            }

            if (["text-sim", "text-trad", "text-pinyin", "text-meaning"].includes(e.id)) {
                updateSentenceVisibility();
            }
        }
    }

    function updateSentenceVisibility() {
        var showSim = Persistence.getItem(frontBack + "text-sim") !== "false";
        var showTrad = Persistence.getItem(frontBack + "text-trad") !== "false";
        var showPinyin = Persistence.getItem(frontBack + "text-pinyin") !== "false";
        var showMeaning = Persistence.getItem(frontBack + "text-meaning") !== "false";

        document.querySelectorAll(".sen-sim").forEach(el => el.style.display = showSim ? "block" : "none");
        document.querySelectorAll(".sen-trad").forEach(el => el.style.display = showTrad ? "block" : "none");
        document.querySelectorAll(".sen-pin").forEach(el => el.style.display = showPinyin ? "block" : "none");
        document.querySelectorAll(".sen-eng").forEach(el => el.style.display = showMeaning ? "block" : "none");
    }

    function applyToggleEffect(id, isShow) {
        var effects = {
            "text-pinyin": [".pinyin"],
            "text-zhuyin": [".zhuyin"],
            "text-sim": ["#char-sim-id"],
            "text-trad": ["#char-trad-id", ".sep"]
        };

        if (effects[id]) {
            effects[id].forEach(selector => showHide(selector, isShow));
        }
    }

    function showHide(type, isShow) {
        if (isShow) {
            document.querySelectorAll(type).forEach(function (val) {
                val.style.display = 'inline';
            });
        } else {
            document.querySelectorAll(type).forEach(function (val) {
                val.style.display = 'none';
            });
        }
    }

    function openSidebar(id) {
        document.getElementById(id).style.width = id === "sidebar" ? "250px" : "160px";
    }

    function closeSidebar(id) {
        document.getElementById(id).style.width = "0";
    }

    document.addEventListener('click', function (event) {
        var sidebar = document.getElementById("sidebar");
        var moreSidebar = document.getElementById("more-info-sidebar");
        var btnMenu = document.getElementById("btnShowMenu");
        var btnMore = document.getElementById("btnMoreOptions");

        if (!sidebar || !moreSidebar) return;

        if (!sidebar.contains(event.target) && !btnMenu.contains(event.target)) {
            closeSidebar("sidebar");
        }

        if (!moreSidebar.contains(event.target) && !btnMore.contains(event.target)) {
            closeSidebar("more-info-sidebar");
        }
    });

    if (Persistence.isAvailable()) {
        if (window.ankiPlatform == "desktop" || isInWebView()) {
            initSwitchPrefs();
        } else {
            window.addEventListener("load", initSwitchPrefs, false);
        }
    }

    function isInWebView() {
        var UA = navigator.userAgent;
        if (/iPhone|iPod|iPad/.test(UA)) {
            if (/(iPhone|iPod|iPad).*AppleWebKit(?!.*Safari)/i.test(UA)) {
                return true;
            }
        }
        if (window.location.href.includes("ankiuser.net")) {
            return true;
        }
        return false;
    }
</script>

    function getColoredHanziHTML(pinyinText, simplified) {
        var pinyinElem = colorizedHTMLElementFromString(
            pinyinText,
            null,
            ["text-color5", "text-color1", "text-color2", "text-color3", "text-color4"]
        );

        var spans = Array.from(pinyinElem.querySelectorAll('[class^="text-color"]'));

        function isHanzi(ch) {
            return /[\u3400-\u4DBF\u4E00-\u9FFF\uF900-\uFAFF]/.test(ch);
        }

        var spanIndex = 0;
        var out = "";

        for (var i = 0; i < simplified.length; i++) {
            var ch = simplified[i];

            if (!isHanzi(ch)) {
                out += ch;
                continue;
            }

            if (spanIndex < spans.length) {
                var span = spans[spanIndex++];
                var cls = span.getAttribute("class") || "";
                out += '<span class="' + cls + '">' + ch + "</span>";
            } else {
                out += ch;
            }
        }

        var html = '<span>' + out + "</span>";
        return [pinyinElem, html];
    }
</script>

<div id="char_sentence">
    <hr>
    <div><b>Example Sentences</b></div>
    <div id="sentences"></div>
    <button id="loadMore">Load more</button>
</div>

<script>
    var offset = 0;
    var db = null;

    function getSentenceSettings() {
        return {
            limit: parseInt(Persistence.getItem(frontBack + "no-of-sentence") ||
                document.getElementById("no-of-sentence")?.value) || 5,
            level: parseInt(Persistence.getItem(frontBack + "level-of-sentence") ||
                document.getElementById("level-of-sentence")?.value) || 9,
            length: parseInt(Persistence.getItem(frontBack + "length-of-sentence") ||
                document.getElementById("length-of-sentence")?.value) || 10,
            random: Persistence.getItem(frontBack + "text-sentence-random") !== "false" &&
                (document.getElementById("text-sentence-random")?.checked ?? true),
            colored: Persistence.getItem(frontBack + "text-sentence-colored") !== "false" &&
                (document.getElementById("text-sentence-colored")?.checked ?? true),
            show: Persistence.getItem(frontBack + "text-sentence") !== "false" &&
                (document.getElementById("text-sentence")?.checked ?? true)
        };
    }

    setTimeout(() => {
        var settings = getSentenceSettings();
        var sentenceDiv = document.getElementById("char_sentence");
        if (sentenceDiv) {
            sentenceDiv.style.display = settings.show ? "block" : "none";
        }
        if (settings.show) {
            loadSentences();
        }
    }, 100);

    var sentences = null;
    var indexByChar = null;
    var cachedResults = [];
    var lastQueryKey = "";
    var offset = 0;
    var isLoading = false;

    function shuffle(array) {
        for (var i = array.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = array[i];
            array[i] = array[j];
            array[j] = tmp;
        }
        return array;
    }

    function buildCharIndex(data) {
        var index = Object.create(null);

        for (var i = 0; i < data.length; i++) {
            var sentence = data[i];
            if (!sentence.simplified) continue;

            var uniqueChars = new Set(sentence.simplified);
            uniqueChars.forEach(function (ch) {
                if (!index[ch]) index[ch] = [];
                index[ch].push(sentence);
            });
        }
        return index;
    }

    function makeQueryKey(char, settings) {
        return (
            char + "|" +
            settings.level + "|" +
            settings.length + "|" +
            settings.limit + "|" +
            (settings.random ? 1 : 0)
        );
    }

    function escapeRegex(text) {
        return text.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    async function loadSentences() {
        if (sentences && indexByChar) {
            loadMore();
            return;
        }

        if (isLoading) return;
        isLoading = true;

        try {
            var response = await fetch("_chinese_sentences.json", { cache: "no-store" });
            if (!response.ok) throw new Error("Failed to load JSON");

            sentences = await response.json();
            indexByChar = buildCharIndex(sentences);

            cachedResults = [];
            lastQueryKey = "";
            offset = 0;

            loadMore();
        } catch (error) {
            console.log("Failed to load sentences:", error);
            var container = document.getElementById("char_sentence");
            if (container) container.style.display = "none";
        } finally {
            isLoading = false;
        }
    }

    function loadMore() {
        if (!sentences || !indexByChar) return;

        var settings = getSentenceSettings();
        var searchText = "{{Simplified}}";

        var queryKey = makeQueryKey(searchText, settings);

        if (queryKey !== lastQueryKey) {
            lastQueryKey = queryKey;
            offset = 0;

            var pool;
            if (searchText.length === 1) {
                pool = indexByChar[searchText] || [];
            } else {
                pool = sentences;
            }

            cachedResults = pool.filter(function (s) {
                return (
                    s.simplified &&
                    s.simplified.includes(searchText) &&
                    s.hsk_level <= settings.level &&
                    s.simplified.length < settings.length
                );
            });

            if (settings.random) {
                shuffle(cachedResults);
            } else {
                cachedResults.sort(function (a, b) {
                    return a.id - b.id;
                });
            }
        }

        var page = cachedResults.slice(offset, offset + settings.limit);
        if (!page.length) {
            var loadMoreBtn = document.getElementById("loadMore");
            if (loadMoreBtn) {
                loadMoreBtn.disabled = true;
                loadMoreBtn.textContent = "No more sentences";
            }
            return;
        }

        var container = document.getElementById("sentences");
        if (!container) return;

        var showSimplified = Persistence.getItem(frontBack + "text-sim") !== "false";
        var showTraditional = Persistence.getItem(frontBack + "text-trad") !== "false";
        var showPinyin = Persistence.getItem(frontBack + "text-pinyin") !== "false";
        var showMeaning = Persistence.getItem(frontBack + "text-meaning") !== "false";

        var highlightRegex = new RegExp(escapeRegex(searchText), "g");

        page.forEach(function (s) {
            var simplifiedHTML = s.simplified || "";
            var pinyinHTML = s.pinyin || "";

            if (settings.colored && s.simplified && s.pinyin) {
                var colored = getColoredHanziHTML(s.pinyin, s.simplified);
                pinyinHTML = colored[0].innerHTML;
                simplifiedHTML = colored[1];
            }

            simplifiedHTML = simplifiedHTML.replace(
                highlightRegex,
                "<b>" + searchText + "</b>"
            );

            var div = document.createElement("div");
            div.className = "sentence";
            div.innerHTML =
                '<div class="sen-card">' +
                '<div class="sen-sim" style="display:' + (showSimplified ? "block" : "none") + '">' + simplifiedHTML + "</div>" +
                '<div class="sen-trad" style="display:' + (showTraditional ? "block" : "none") + '">' + (s.traditional || "") + "</div>" +
                '<div class="sen-pin" style="display:' + (showPinyin ? "block" : "none") + '">' + pinyinHTML + "</div>" +
                '<div class="sen-eng" style="display:' + (showMeaning ? "block" : "none") + '">' + (s.english || "") + "</div>" +
                "</div>";

            container.appendChild(div);
        });

        offset += settings.limit;
    }

    var loadMoreBtn = document.getElementById("loadMore");
    if (loadMoreBtn) {
        loadMoreBtn.onclick = loadMore;
    }
</script>
