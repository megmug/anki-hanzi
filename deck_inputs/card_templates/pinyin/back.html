<div class="modal-footer1">

        <div class="icon">
            <i class="material-icons">play_arrow</i>
        </div>
    </a>
    <a class="btn" id='btnMoreOptions' onclick="openSidebar('more-info-sidebar')">

            <i class="material-icons">more_vert</i>
        </div>
    </a>
</div>

<hr>

<div id="char_meaning" class="meaning-card">{{Meaning}}</div>

<script>
    window.HANZI_CARD_SETTINGS = __HANZI_CARD_SETTINGS__;

    function collectAudioElements() {
        var audioDiv = document.getElementById('audio');
        if (!audioDiv) return [];
        var allChildren = audioDiv.getElementsByTagName("*");
        var audioElements = [];
        for (var i = 0; i < allChildren.length; i++) {
            var tag = allChildren[i].tagName;
            if (tag === "AUDIO" || tag === "A") {
                audioElements.push(allChildren[i]);
            }
        }
        return audioElements;
    }

    function playAudio() {
        var audioElements = collectAudioElements();
        if (audioElements.length === 0) return;

        function playNext(index) {
            if (index >= audioElements.length) return;
            var el = audioElements[index];
            if (el.tagName === "AUDIO") {
                el.onended = function() {
                    playNext(index + 1);
                };
                el.play();
            } else {
                el.click();
                // Anki <a> sound links have no onended event; chain with a fixed delay
                setTimeout(function() {
                    playNext(index + 1);
                }, 1500);
            }
        }
        playNext(0);
    }

    function setupAudioButton() {
        var button = document.getElementById("btnPlayAudio");
        if (!button) return;
        if (collectAudioElements().length === 0) {
            button.style.display = "none";
            return;
        }
        button.onclick = function () {
            playAudio();
        };
    }

    function showHide(selector, isShow, style) {
        document.querySelectorAll(selector).forEach(function (element) {
            element.style.display = isShow ? (style || "inline") : "none";
        });
    }

    function openSidebar(id) {
        var sidebar = document.getElementById(id);
        if (sidebar) {
            sidebar.style.width = "160px";
        }
    }

    function closeSidebar(id) {
        var sidebar = document.getElementById(id);
        if (sidebar) {
            sidebar.style.width = "0";
        }
    }

    function applyCardSettings() {
        var settings = (window.HANZI_CARD_SETTINGS && window.HANZI_CARD_SETTINGS.back) || {};
        showHide("#char_pinyin", settings.show_pinyin);
        showHide("#char_meaning", settings.show_meaning, "block");
        showHide("#char_sim", settings.show_simplified, "block");
        showHide(".pinyin", settings.show_pinyin);
        showHide("#char-sim-id", settings.show_simplified);
    }

    document.addEventListener('click', function (event) {
        var moreInfoSidebar = document.getElementById("more-info-sidebar");
        var moreInfoButton = document.getElementById("btnMoreOptions");
        if (!moreInfoSidebar || !moreInfoButton) { return };

        if (!moreInfoSidebar.contains(event.target)) {
            closeSidebar("more-info-sidebar");
        }

        if (moreInfoButton.contains(event.target)) {
            openSidebar("more-info-sidebar");
        }
    });

    setupAudioButton();
    applyCardSettings();
</script>
