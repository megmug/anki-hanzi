name: Build APKG

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-apkg-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apkg:
    name: Build APKG with Nix
    runs-on: ubuntu-latest
    timeout-minutes: 600

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command
            sandbox = false

      - name: Build APKG package
        run: nix-build --out-link result --argstr buildId "${GITHUB_SHA}"

      - name: Define release metadata
        id: release_meta
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          BUILD_STAMP="$(date -u +%Y%m%d-%H%M%S)"
          RELEASE_NAME="anki-hanzi-${BUILD_STAMP}-${SHORT_SHA}"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "release_name=${RELEASE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Collect build artifacts
        env:
          RELEASE_NAME: ${{ steps.release_meta.outputs.release_name }}
          SHORT_SHA: ${{ steps.release_meta.outputs.short_sha }}
        run: |
          mkdir -p ci-artifacts
          cp -L result/anki-hanzi-${SHORT_SHA}.apkg ci-artifacts/
          find -H result -maxdepth 1 -type f -name '*.py' -exec cp -L {} ci-artifacts/ \;
          {
            echo "# anki-hanzi APKG build"
            echo
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Build ID: \`${GITHUB_SHA::7}\`"
            echo "- Source ref: \`${GITHUB_REF_NAME}\`"
            echo
            echo "## Included artifacts"
            echo
            echo "- \`anki-hanzi-${SHORT_SHA}.apkg\`"
            echo "- migration scripts from the Nix result, if present"
            echo
            echo "## Migration script naming"
            echo
            echo "Release names use a UTC timestamp plus the target build hash."
            echo "APKG filenames keep the plain target build hash."
            echo "Migration scripts keep their checked-in filenames. A file named"
            echo "\`migrate-<old-hash>.py\` means: migrate from that old build hash"
            echo "to this release's target build."
          } > ci-artifacts/README.md

      - name: Upload APKG artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.release_meta.outputs.release_name }}
          path: ci-artifacts/
          if-no-files-found: error
          retention-days: 14

      - name: Create or update release
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_NAME: ${{ steps.release_meta.outputs.release_name }}
        run: |
          TAG="$RELEASE_NAME"
          TITLE="$TAG"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" ci-artifacts/* --clobber
            gh release edit "$TAG" \
              --target "$GITHUB_SHA" \
              --title "$TITLE" \
              --notes-file ci-artifacts/README.md
          else
            gh release create "$TAG" ci-artifacts/* \
              --target "$GITHUB_SHA" \
              --title "$TITLE" \
              --notes-file ci-artifacts/README.md
          fi
